# Deploys the ASP.NET Core API to Azure App Service (same host the SPA uses via VITE_API_URL).
#
# Required GitHub secret (repo → Settings → Secrets):
#   AZURE_WEBAPP_BACKEND_PUBLISH_PROFILE
# Download from Azure Portal → App Service → havyn-team0110-backend-gwhwcdbsfhcthbbr →
#   Get publish profile → copy file contents into the secret.
#
name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/azure-app-service-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish backend/Mission11_Bates.API/Mission11_Bates.csproj -c Release -o "${{ github.workspace }}/publish"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: havyn-team0110-backend-gwhwcdbsfhcthbbr
          publish-profile: ${{ secrets.AZURE_WEBAPP_BACKEND_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

      - name: Smoke test — StaffAccounts route (expect 401 without auth, not 404)
        env:
          API_BASE: https://havyn-team0110-backend-gwhwcdbsfhcthbbr.mexicocentral-01.azurewebsites.net
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" "${API_BASE}/api/StaffAccounts?pageSize=1&pageIndex=1")
          echo "GET /api/StaffAccounts (unauthenticated) -> HTTP ${code}"
          if [ "${code}" = "404" ]; then
            echo "::error::Route returns 404 — controller not deployed or wrong site."
            exit 1
          fi
          if [ "${code}" != "401" ] && [ "${code}" != "403" ]; then
            echo "::error::Expected 401 or 403 (authorized route, no session), got ${code}"
            exit 1
          fi
          echo "Smoke test passed (route registered)."
